<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correttore Ortografico AI - Versione Stabile</title>
    <!-- Tailwind CSS per lo styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel per compilare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-stone-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [inputText, setInputText] = useState('');
            const [standardOutput, setStandardOutput] = useState('');
            const [fluidOutput, setFluidOutput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [copiedType, setCopiedType] = useState(null);
            const [userApiKey, setUserApiKey] = useState('');

            // Inizializza le icone Lucide
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [standardOutput, fluidOutput, isLoading, error]);

            const handleAnalyze = async () => {
                if (!inputText.trim()) return;
                if (!userApiKey.trim()) {
                    setError('Per favore, inserisci la tua Google Gemini API Key.');
                    return;
                }

                setIsLoading(true);
                setError('');
                setStandardOutput('');
                setFluidOutput('');

                // Prompt ottimizzato per estrarre solo JSON
                const prompt = `Sei un correttore di bozze esperto. Correggi il testo fornito. Restituisci RIGOROSAMENTE un oggetto JSON con chiavi "standard" (correzione letterale degli errori) e "fluida" (riscrittura elegante e naturale).`;

                const payload = {
                    contents: [{ parts: [{ text: inputText }] }],
                    systemInstruction: { parts: [{ text: prompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                    }
                };

                const fetchWithRetry = async (url, options, retries = 3, backoff = 1000) => {
                    try {
                        const response = await fetch(url, options);
                        const data = await response.json();
                        
                        if (!response.ok) {
                            console.error("Dettaglio Errore API:", data);
                            throw new Error(data.error?.message || `Errore HTTP ${response.status}`);
                        }
                        return data;
                    } catch (err) {
                        if (retries <= 0) throw err;
                        await new Promise(resolve => setTimeout(resolve, backoff));
                        return fetchWithRetry(url, options, retries - 1, backoff * 2);
                    }
                };

                try {
                    // Cambiato l'endpoint a v1 e il modello a gemini-1.5-flash
                    const apiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${userApiKey.trim()}`;
                    
                    const data = await fetchWithRetry(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                        const resultJson = JSON.parse(data.candidates[0].content.parts[0].text);
                        setStandardOutput(resultJson.standard || "Nessuna correzione necessaria.");
                        setFluidOutput(resultJson.fluida || "Nessuna riscrittura disponibile.");
                    } else {
                        throw new Error('L\'AI ha restituito una risposta incompleta o vuota.');
                    }
                } catch (err) {
                    console.error("Errore catturato:", err);
                    setError(`Errore: ${err.message}. Verifica che la chiave sia attiva e corretta.`);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClipboard = (text, type) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopiedType(type);
                setTimeout(() => setCopiedType(null), 2000);
            };

            return (
                <div className="min-h-screen">
                    <header className="bg-emerald-700 text-white py-10 px-4 text-center shadow-md">
                        <div className="flex items-center justify-center gap-3 mb-3">
                            <i data-lucide="check-check" className="w-10 h-10 text-emerald-200"></i>
                            <h1 className="text-4xl font-black tracking-tight">Correttore AI</h1>
                        </div>
                        <p className="text-emerald-100 font-medium max-w-lg mx-auto">Perfeziona la tua scrittura con la potenza di Google Gemini 1.5 Flash</p>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 md:p-10 -mt-6">
                        {/* Box Chiave API */}
                        <div className="mb-8 bg-white p-6 rounded-2xl border border-emerald-100 shadow-xl flex flex-col md:flex-row items-center gap-4">
                            <div className="flex items-center gap-2 text-emerald-800 font-bold whitespace-nowrap">
                                <i data-lucide="key-round" className="w-5 h-5 text-emerald-500"></i>
                                Gemini API Key:
                            </div>
                            <input
                                type="password"
                                value={userApiKey}
                                onChange={(e) => setUserApiKey(e.target.value)}
                                placeholder="Incolla qui la tua API Key (es. AIza...)"
                                className="w-full bg-stone-50 border-2 border-emerald-50 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 transition-all text-sm font-mono"
                            />
                        </div>

                        {/* Input Testo */}
                        <div className="mb-8 bg-white rounded-3xl shadow-lg border border-emerald-50 overflow-hidden">
                            <textarea
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                className="w-full h-64 p-8 outline-none resize-none text-xl leading-relaxed text-gray-800 placeholder:text-gray-300"
                                placeholder="Inserisci il testo da analizzare..."
                            ></textarea>
                            
                            <div className="bg-stone-50 p-4 border-t border-emerald-50 flex justify-between items-center">
                                <span className="text-xs font-bold text-emerald-800/40 uppercase tracking-widest px-4">
                                    {inputText.length} caratteri
                                </span>
                                <div className="flex gap-3">
                                    <button
                                        onClick={() => { setInputText(''); setStandardOutput(''); setFluidOutput(''); setError(''); }}
                                        className="px-6 py-2 text-sm font-bold text-emerald-700 hover:text-emerald-900 transition-colors"
                                    >
                                        Svuota
                                    </button>
                                    <button
                                        onClick={handleAnalyze}
                                        disabled={isLoading || !inputText.trim()}
                                        className="bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-300 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-emerald-200 active:scale-95 flex items-center gap-2"
                                    >
                                        {isLoading ? (
                                            <><i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i> Analisi...</>
                                        ) : (
                                            <><i data-lucide="sparkles" className="w-5 h-5"></i> Analizza ora</>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Error Alert */}
                        {error && (
                            <div className="bg-red-50 text-red-700 p-5 rounded-2xl mb-8 border-2 border-red-100 flex items-start gap-4 animate-bounce">
                                <i data-lucide="alert-triangle" className="w-6 h-6 mt-0.5 shrink-0"></i>
                                <div>
                                    <p className="font-bold">Attenzione</p>
                                    <p className="text-sm opacity-90">{error}</p>
                                </div>
                            </div>
                        )}

                        {/* Risultati */}
                        {(standardOutput || fluidOutput || isLoading) && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                {/* Colonna Standard */}
                                <div className={isLoading ? 'opacity-30 blur-[2px] transition-all' : 'transition-all'}>
                                    <div className="flex justify-between items-center mb-3 px-2">
                                        <div className="flex items-center gap-2">
                                            <i data-lucide="check-circle" className="w-4 h-4 text-emerald-600"></i>
                                            <span className="text-xs font-black text-emerald-900/60 uppercase tracking-widest">Correzione Standard</span>
                                        </div>
                                        {standardOutput && (
                                            <button onClick={() => copyToClipboard(standardOutput, 'std')} className="text-emerald-600 hover:bg-emerald-50 px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-100">
                                                <i data-lucide={copiedType === 'std' ? 'check' : 'copy'} className="w-3.5 h-3.5"></i>
                                                {copiedType === 'std' ? 'Copiato' : 'Copia'}
                                            </button>
                                        )}
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border-2 border-emerald-50 shadow-sm min-h-[200px]">
                                        <p className="text-gray-700 leading-relaxed whitespace-pre-wrap italic">
                                            {standardOutput || "In attesa di analisi..."}
                                        </p>
                                    </div>
                                </div>

                                {/* Colonna Fluida */}
                                <div className={isLoading ? 'opacity-30 blur-[2px] transition-all' : 'transition-all'}>
                                    <div className="flex justify-between items-center mb-3 px-2">
                                        <div className="flex items-center gap-2">
                                            <i data-lucide="wand-2" className="w-4 h-4 text-teal-600"></i>
                                            <span className="text-xs font-black text-teal-900/60 uppercase tracking-widest">Riscrittura Fluida</span>
                                        </div>
                                        {fluidOutput && (
                                            <button onClick={() => copyToClipboard(fluidOutput, 'flu')} className="text-teal-600 hover:bg-teal-50 px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-teal-100">
                                                <i data-lucide={copiedType === 'flu' ? 'check' : 'copy'} className="w-3.5 h-3.5"></i>
                                                {copiedType === 'flu' ? 'Copiato' : 'Copia'}
                                            </button>
                                        )}
                                    </div>
                                    <div className="bg-teal-50/20 p-8 rounded-[2rem] border-2 border-teal-100 shadow-sm min-h-[200px]">
                                        <p className="font-semibold text-gray-800 leading-relaxed whitespace-pre-wrap">
                                            {fluidOutput || "In attesa di analisi..."}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 py-10 border-t border-emerald-100 text-center">
                        <p className="text-emerald-900/30 text-xs font-bold uppercase tracking-tighter">
                            Strumento di correzione professionale basato su Gemini 1.5 Flash
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
