<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correttore Ortografico AI</title>
    <!-- Tailwind CSS per lo styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel per compilare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-stone-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Icone Lucide caricate via window
        const Icon = ({ name, ...props }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    const svgString = lucide.createIcons({
                        icons: { [name]: icon },
                        attrs: { ...props }
                    });
                }
            }, [name]);
            // Fallback semplice usando i tag lucide-statici o SVG inline se necessario
            // Per semplicità in questo file HTML usiamo direttamente le icone tramite nomi
            return <i data-lucide={name} {...props}></i>;
        };

        function App() {
            const [inputText, setInputText] = useState('');
            const [standardOutput, setStandardOutput] = useState('');
            const [fluidOutput, setFluidOutput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [copiedType, setCopiedType] = useState(null);
            const [userApiKey, setUserApiKey] = useState('');

            useEffect(() => {
                // Inizializza le icone lucide dopo il render
                lucide.createIcons();
            }, [standardOutput, fluidOutput, isLoading, error]);

            const handleAnalyze = async () => {
                if (!inputText.trim()) return;
                if (!userApiKey.trim()) {
                    setError('Per favore, inserisci la tua Google Gemini API Key.');
                    return;
                }

                setIsLoading(true);
                setError('');
                setStandardOutput('');
                setFluidOutput('');

                const prompt = `Sei un correttore di bozze esperto. Correggi il testo fornito. Restituisci JSON con chiavi "standard" (correzione letterale) e "fluida" (riscrittura elegante).`;

                const payload = {
                    contents: [{ parts: [{ text: inputText }] }],
                    systemInstruction: { parts: [{ text: prompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                standard: { type: "STRING" },
                                fluida: { type: "STRING" }
                            },
                            required: ["standard", "fluida"]
                        }
                    }
                };

                let retries = 3;
                while (retries > 0) {
                    try {
                        const response = await fetch(
                            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${userApiKey.trim()}`,
                            {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            }
                        );

                        if (!response.ok) throw new Error('Errore API. Verifica la chiave.');

                        const data = await response.json();
                        const resultJson = JSON.parse(data.candidates[0].content.parts[0].text);
                        
                        setStandardOutput(resultJson.standard);
                        setFluidOutput(resultJson.fluida);
                        break;
                    } catch (err) {
                        retries--;
                        if (retries === 0) setError(err.message);
                        else await new Promise(r => setTimeout(r, 1000));
                    }
                }
                setIsLoading(false);
            };

            const copyToClipboard = (text, type) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopiedType(type);
                setTimeout(() => setCopiedType(null), 2000);
            };

            return (
                <div className="min-h-screen">
                    <header className="bg-emerald-700 text-white py-8 px-4 text-center shadow-lg">
                        <div className="flex items-center justify-center gap-3 mb-2">
                            <i data-lucide="pen-tool" className="w-8 h-8 text-emerald-200"></i>
                            <h1 className="text-3xl font-bold">Correttore Ortografico</h1>
                        </div>
                        <p className="opacity-90">Correzione professionale istantanea via AI</p>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 md:p-8">
                        <div className="mb-6 bg-white p-4 rounded-xl border border-emerald-100 shadow-sm flex flex-col md:flex-row items-center gap-4">
                            <div className="flex items-center gap-2 text-emerald-800 font-medium">
                                <i data-lucide="key" className="w-5 h-5"></i>
                                API Key:
                            </div>
                            <input
                                type="password"
                                value={userApiKey}
                                onChange={(e) => setUserApiKey(e.target.value)}
                                placeholder="Incolla la tua chiave Gemini..."
                                className="w-full bg-stone-50 border border-emerald-200 rounded-lg px-4 py-2 outline-none focus:border-emerald-500 transition-all"
                            />
                        </div>

                        <div className="mb-6">
                            <textarea
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                className="w-full h-56 p-5 bg-white border-2 border-emerald-100 rounded-2xl shadow-sm focus:border-emerald-500 outline-none resize-y text-lg"
                                placeholder="Incolla qui il tuo testo..."
                            ></textarea>
                        </div>

                        <div className="flex justify-center gap-4 mb-12">
                            <button
                                onClick={handleAnalyze}
                                disabled={isLoading || !inputText.trim()}
                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-4 rounded-full font-bold transition-all shadow-md disabled:opacity-50"
                            >
                                {isLoading ? 'Analisi in corso...' : 'Analizza ora'}
                            </button>
                            <button
                                onClick={() => { setInputText(''); setStandardOutput(''); setFluidOutput(''); }}
                                className="bg-white border-2 border-emerald-200 text-emerald-700 px-10 py-4 rounded-full font-bold"
                            >
                                Pulisci
                            </button>
                        </div>

                        {error && (
                            <div className="bg-red-50 text-red-700 p-4 rounded-xl mb-8 border border-red-200">
                                {error}
                            </div>
                        )}

                        {(standardOutput || fluidOutput || isLoading) && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className={isLoading ? 'opacity-40' : ''}>
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-black text-emerald-800/60 uppercase">Standard</span>
                                        {standardOutput && (
                                            <button onClick={() => copyToClipboard(standardOutput, 'std')} className="text-emerald-700 text-sm font-bold flex items-center gap-1">
                                                <i data-lucide={copiedType === 'std' ? 'check' : 'copy'} className="w-4 h-4"></i>
                                                {copiedType === 'std' ? 'Copiato' : 'Copia'}
                                            </button>
                                        )}
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border-2 border-emerald-50 min-h-[150px]">
                                        <p className="italic text-gray-700">{standardOutput}</p>
                                    </div>
                                </div>

                                <div className={isLoading ? 'opacity-40' : ''}>
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-black text-teal-600 uppercase">Fluida</span>
                                        {fluidOutput && (
                                            <button onClick={() => copyToClipboard(fluidOutput, 'flu')} className="text-teal-700 text-sm font-bold flex items-center gap-1">
                                                <i data-lucide={copiedType === 'flu' ? 'check' : 'copy'} className="w-4 h-4"></i>
                                                {copiedType === 'flu' ? 'Copiato' : 'Copia'}
                                            </button>
                                        )}
                                    </div>
                                    <div className="bg-emerald-50/50 p-6 rounded-2xl border-2 border-teal-100 min-h-[150px]">
                                        <p className="font-medium text-gray-800">{fluidOutput}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
