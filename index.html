<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correttore Ortografico AI - Versione Streaming</title>
    <!-- Tailwind CSS per lo styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel per compilare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Cursore lampeggiante per l'effetto scrittura */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
            color: #059669;
            font-weight: bold;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-stone-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [inputText, setInputText] = useState('');
            const [correctedOutput, setCorrectedOutput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isStreaming, setIsStreaming] = useState(false);
            const[error, setError] = useState('');
            const [copiedType, setCopiedType] = useState(null);
            const [userApiKey, setUserApiKey] = useState('');

            // Ottimizzazione: aggiorna le icone solo quando cambiano gli stati principali (non durante lo streaming del testo)
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isLoading, error, copiedType]);

            const handleAnalyze = async () => {
                if (!inputText.trim()) return;
                if (!userApiKey.trim()) {
                    setError('Per favore, inserisci la tua Google Gemini API Key.');
                    return;
                }

                setIsLoading(true);
                setIsStreaming(true);
                setError('');
                setCorrectedOutput('');

                // Prompt ottimizzato per testo semplice (nessun JSON)
                const systemPrompt = `Sei un correttore di test esperto. Correggi gli errori grammaticali e sintattici del testo fornito, rendendolo fluido, professionale e naturale. RESTITUISCI SOLO ED ESCLUSIVAMENTE IL TESTO CORRETTO. Non aggiungere saluti, commenti, virgolette o formattazioni.`;

                const payload = {
                    contents: [{ parts: [{ text: inputText }] }],
                    system_instruction: { parts:[{ text: systemPrompt }] }
                    // NIENTE PIÙ JSON CONSTRAINT!
                };

                try {
                    // Endpoint aggiornato per lo STREAMING (alt=sse)
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?alt=sse&key=${userApiKey.trim()}`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `Errore HTTP ${response.status}`);
                    }

                    // Gestione del flusso di dati in tempo reale (Server-Sent Events)
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let buffer = "";
                    let fullText = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        
                        // Dividi il buffer ad ogni doppio a capo (formato standard SSE)
                        let boundary = buffer.indexOf('\n\n');
                        while (boundary !== -1) {
                            const chunk = buffer.slice(0, boundary).trim();
                            buffer = buffer.slice(boundary + 2);
                            
                            if (chunk.startsWith('data:')) {
                                const dataStr = chunk.slice(5).trim();
                                if (dataStr) {
                                    try {
                                        const parsed = JSON.parse(dataStr);
                                        const textPart = parsed.candidates?.[0]?.content?.parts?.[0]?.text;
                                        if (textPart) {
                                            fullText += textPart;
                                            // Aggiorna la UI istantaneamente
                                            setCorrectedOutput(fullText);
                                        }
                                    } catch (e) {
                                        console.warn("Errore di parsing del chunk", e);
                                    }
                                }
                            }
                            boundary = buffer.indexOf('\n\n');
                        }
                    }
                } catch (err) {
                    console.error("Errore catturato:", err);
                    setError(`Errore: ${err.message}. Verifica la chiave API.`);
                } finally {
                    setIsLoading(false);
                    setIsStreaming(false); // Ferma l'effetto del cursore lampeggiante
                }
            };

            const copyToClipboard = (text, type) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopiedType(type);
                setTimeout(() => setCopiedType(null), 2000);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-emerald-700 text-white py-10 px-4 text-center shadow-md">
                        <div className="flex items-center justify-center gap-3 mb-3">
                            <i data-lucide="zap" className="w-10 h-10 text-emerald-200"></i>
                            <h1 className="text-4xl font-black tracking-tight">Correttore Real-Time</h1>
                        </div>
                        <p className="text-emerald-100 font-medium max-w-lg mx-auto">Scrittura perfetta alla velocità della luce con Gemini 2.5 Flash</p>
                    </header>

                    <main className="flex-grow max-w-4xl mx-auto w-full p-4 md:p-10 -mt-6">
                        {/* Box Chiave API */}
                        <div className="mb-8 bg-white p-6 rounded-2xl border border-emerald-100 shadow-xl flex flex-col md:flex-row items-center gap-4">
                            <div className="flex items-center gap-2 text-emerald-800 font-bold whitespace-nowrap">
                                <i data-lucide="key-round" className="w-5 h-5 text-emerald-500"></i>
                                Gemini API Key:
                            </div>
                            <input
                                type="password"
                                value={userApiKey}
                                onChange={(e) => setUserApiKey(e.target.value)}
                                placeholder="Incolla qui la tua API Key (es. AIza...)"
                                className="w-full bg-stone-50 border-2 border-emerald-50 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 transition-all text-sm font-mono"
                            />
                        </div>

                        {/* Input Testo */}
                        <div className="mb-8 bg-white rounded-3xl shadow-lg border border-emerald-50 overflow-hidden relative">
                            {isLoading && !correctedOutput && (
                                <div className="absolute inset-0 bg-white/50 backdrop-blur-sm z-10 flex items-center justify-center">
                                    <div className="bg-emerald-600 text-white px-6 py-3 rounded-full font-bold shadow-lg flex items-center gap-3 animate-pulse">
                                        <i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i>
                                        Connessione in corso...
                                    </div>
                                </div>
                            )}
                            
                            <textarea
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                className="w-full h-56 p-8 outline-none resize-none text-xl leading-relaxed text-gray-800 placeholder:text-gray-300"
                                placeholder="Inserisci il testo da correggere..."
                                disabled={isLoading}
                            ></textarea>
                            
                            <div className="bg-stone-50 p-4 border-t border-emerald-50 flex justify-between items-center">
                                <span className="text-xs font-bold text-emerald-800/40 uppercase tracking-widest px-4">
                                    {inputText.length} caratteri
                                </span>
                                <div className="flex gap-3">
                                    <button
                                        onClick={() => { setInputText(''); setCorrectedOutput(''); setError(''); }}
                                        className="px-6 py-2 text-sm font-bold text-emerald-700 hover:text-emerald-900 transition-colors"
                                        disabled={isLoading}
                                    >
                                        Svuota
                                    </button>
                                    <button
                                        onClick={handleAnalyze}
                                        disabled={isLoading || !inputText.trim()}
                                        className="bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-300 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-emerald-200 active:scale-95 flex items-center gap-2"
                                    >
                                        <i data-lucide="sparkles" className="w-5 h-5"></i>
                                        {isLoading ? 'Analisi...' : 'Correggi testo'}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Error Alert */}
                        {error && (
                            <div className="bg-red-50 text-red-700 p-5 rounded-2xl mb-8 border-2 border-red-100 flex items-start gap-4 animate-bounce">
                                <i data-lucide="alert-triangle" className="w-6 h-6 mt-0.5 shrink-0"></i>
                                <div>
                                    <p className="font-bold">Attenzione</p>
                                    <p className="text-sm opacity-90">{error}</p>
                                </div>
                            </div>
                        )}

                        {/* Risultato in Streaming */}
                        {(correctedOutput || isLoading) && (
                            <div className="transition-all duration-300 transform translate-y-0 opacity-100">
                                <div className="flex justify-between items-center mb-3 px-2">
                                    <div className="flex items-center gap-2">
                                        <i data-lucide="check-circle-2" className="w-5 h-5 text-emerald-600"></i>
                                        <span className="text-sm font-black text-emerald-900/60 uppercase tracking-widest flex items-center gap-2">
                                            Testo Corretto 
                                            {isStreaming && <span className="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>}
                                        </span>
                                    </div>
                                    {!isStreaming && correctedOutput && (
                                        <button onClick={() => copyToClipboard(correctedOutput, 'corr')} className="text-emerald-700 bg-emerald-100 hover:bg-emerald-200 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors shadow-sm active:scale-95">
                                            <i data-lucide={copiedType === 'corr' ? 'check' : 'copy'} className="w-4 h-4"></i>
                                            {copiedType === 'corr' ? 'Copiato!' : 'Copia testo'}
                                        </button>
                                    )}
                                </div>
                                <div className="bg-white p-8 md:p-10 rounded-[2rem] border-2 border-emerald-100 shadow-xl min-h-[200px]">
                                    <p className={`text-gray-800 text-xl font-medium leading-relaxed whitespace-pre-wrap ${isStreaming ? 'typing-cursor' : ''}`}>
                                        {correctedOutput}
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-10 py-8 border-t border-emerald-100 text-center bg-white/50">
                        <p className="text-emerald-900/30 text-xs font-bold uppercase tracking-tighter">
                            Strumento di correzione real-time basato su Gemini 2.5 Flash
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
