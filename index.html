<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correttore Ortografico AI - Versione Stabile</title>
    <!-- Tailwind CSS per lo styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel per compilare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-stone-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [inputText, setInputText] = useState('');
            const [standardOutput, setStandardOutput] = useState('');
            const [fluidOutput, setFluidOutput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const[copiedType, setCopiedType] = useState(null);
            const [userApiKey, setUserApiKey] = useState('');

            // Inizializza le icone Lucide
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            },[standardOutput, fluidOutput, isLoading, error]);

            const handleAnalyze = async () => {
                if (!inputText.trim()) return;
                if (!userApiKey.trim()) {
                    setError('Per favore, inserisci la tua Google Gemini API Key.');
                    return;
                }

                setIsLoading(true);
                setError('');
                setStandardOutput('');
                setFluidOutput('');

                // Prompt ottimizzato
                const systemPrompt = `Sei un correttore di bozze esperto. Correggi il testo fornito. Restituisci RIGOROSAMENTE un oggetto JSON con chiavi "standard" (correzione letterale degli errori) e "fluida" (riscrittura elegante e naturale).`;

                // Payload corretto per l'API REST (usa lo snake_case)
                const payload = {
                    contents: [{ parts: [{ text: inputText }] }],
                    system_instruction: { parts: [{ text: systemPrompt }] },
                    generation_config: {
                        response_mime_type: "application/json",
                    }
                };

                const fetchWithRetry = async (url, options, retries = 3, backoff = 1000) => {
                    try {
                        const response = await fetch(url, options);
                        const data = await response.json();
                        
                        if (!response.ok) {
                            console.error("Dettaglio Errore API:", data);
                            throw new Error(data.error?.message || `Errore HTTP ${response.status}`);
                        }
                        return data;
                    } catch (err) {
                        if (retries <= 0) throw err;
                        await new Promise(resolve => setTimeout(resolve, backoff));
                        return fetchWithRetry(url, options, retries - 1, backoff * 2);
                    }
                };

                try {
                    // Utilizziamo v1beta perché supporta system_instruction e response_mime_type
                    // Utilizziamo gemini-1.5-flash che è il modello standard più compatibile
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${userApiKey.trim()}`;
                    
                    const data = await fetchWithRetry(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                        const rawText = data.candidates[0].content.parts[0].text;
                        const resultJson = JSON.parse(rawText);
                        setStandardOutput(resultJson.standard || "Nessuna correzione necessaria.");
                        setFluidOutput(resultJson.fluida || "Nessuna riscrittura disponibile.");
                    } else {
                        throw new Error('L\'AI ha restituito una risposta incompleta o vuota.');
                    }
                } catch (err) {
                    console.error("Errore catturato:", err);
                    setError(`Errore: ${err.message}. Verifica la validità della chiave API o riprova tra poco.`);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClipboard = (text, type) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopiedType(type);
                setTimeout(() => setCopiedType(null), 2000);
            };

            return (
                <div className="min-h-screen">
                    <header className="bg-emerald-700 text-white py-10 px-4 text-center shadow-md">
                        <div className="flex items-center justify-center gap-3 mb-3">
                            <i data-lucide="check-check" className="w-10 h-10 text-emerald-200"></i>
                            <h1 className="text-4xl font-black tracking-tight">Correttore AI</h1>
                        </div>
                        <p className="text-emerald-100 font-medium max-w-lg mx-auto">Perfeziona la tua scrittura con la potenza di Google Gemini 1.5 Flash</p>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 md:p-10 -mt-6">
                        {/* Box Chiave API */}
                        <div className="mb-8 bg-white p-6 rounded-2xl border border-emerald-100 shadow-xl flex flex-col md:flex-row items-center gap-4">
                            <div className="flex items-center gap-2 text-emerald-800 font-bold whitespace-nowrap">
                                <i data-lucide="key-round" className="w-5 h-5 text-emerald-500"></i>
                                Gemini API Key:
                            </div>
                            <input
                                type="password"
                                value={userApiKey}
                                onChange={(e) => setUserApiKey(e.target.value)}
                                placeholder="Incolla qui la tua API Key (es. AIza...)"
                                className="w-full bg-stone-50 border-2 border-emerald-50 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 transition-all text-sm font-mono"
                            />
                        </div>

                        {/* Input Testo */}
                        <div className="mb-8 bg-white rounded-3xl shadow-lg border border-emerald-50 overflow-hidden">
                            <textarea
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                className="w-full h-64 p-8 outline-none resize-none text-xl leading-relaxed text-gray-800 placeholder:text-gray-300"
                                placeholder="Inserisci il testo da analizzare..."
